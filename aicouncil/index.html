const { useState, useEffect } = React;

// HCAIC — THE FINAL DIRECTION
// Hybrid: Option B's library-as-hero architecture + Option A's rhetorical clarity
// + Option C's practitioner faces as proof.
//
// Brand-accurate palette per Kyle & Co 2025 Brand Guidelines:
//   Insight Navy    #273752   (primary anchor)
//   Lilac           #9D92AD   (human, thoughtful accent)
//   Ivory Sand      #F7F1EA   (warm background)
//   Deep Slate      #555961   (grounded neutral)
//   Cloud White     #FFFFFF   (clean canvas)
//   Warm Cream      #FDECCD   (accent highlight)
//
// Voice: trusted peer. No em dashes. No filler adverbs. Kyle could say it.

function HCAIC_Final() {
  const [scrolled, setScrolled] = useState(false);
  const [activeFilter, setActiveFilter] = useState('all');
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  const [menuOpen, setMenuOpen] = useState(false);
  const [selectedResource, setSelectedResource] = useState(null);
  const [widgetDismissed, setWidgetDismissed] = useState(false);
  const [momentumOpen, setMomentumOpen] = useState(false);
  const [selectedMember, setSelectedMember] = useState(null);
  const [accessGranted] = useState(true);
  const [gateOpen, setGateOpen] = useState(false);
  const [pendingResourceCta, setPendingResourceCta] = useState(null);
  const [applyOpen, setApplyOpen] = useState(false);
  const [kcoOpen, setKcoOpen] = useState(false);
  const [applySubmitted, setApplySubmitted] = useState(false);
  const [kcoSubmitted, setKcoSubmitted] = useState(false);
  const [townhallOpen, setTownhallOpen] = useState(false);
  const [townhallSubmitted, setTownhallSubmitted] = useState(false);
  const [underwriterOpen, setUnderwriterOpen] = useState(false);
  const [underwriterSubmitted, setUnderwriterSubmitted] = useState(false);
  const [momentumDownloadOpen, setMomentumDownloadOpen] = useState(false);
  const [momentumDownloadSubmitted, setMomentumDownloadSubmitted] = useState(false);
  const [pillarOpen, setPillarOpen] = useState(null);

  // AI Momentum Model content (from Kyle & Co research report)
  const momentumDrivers = [
    {
      dimension: 'Capability',
      question: 'Are we equipped with the foundations to apply AI in HR?',
      drivers: [
        { name: 'AI Literacy', note: 'Baseline fluency across the function, not just leaders.' },
        { name: 'Governance', note: 'Policies, risk index, oversight that do not stall the work.' },
        { name: 'Integration', note: 'Connected systems and data, not siloed point tools.' },
      ],
    },
    {
      dimension: 'Posture',
      question: 'Are we committed and aligned on how to move?',
      drivers: [
        { name: 'Strategy Acceleration', note: 'A real plan, not endless exploration.' },
        { name: 'Ownership & Coalitions', note: 'Named owners and cross-functional partners.' },
        { name: 'Risk Orientation', note: 'Embrace with guardrails, not avoidance.' },
      ],
    },
    {
      dimension: 'Investment',
      question: 'Are we committing meaningful resources?',
      drivers: [
        { name: 'Investment', note: 'Funding that scales beyond a pilot.' },
        { name: 'People', note: 'Dedicated capacity, not side-of-desk work.' },
        { name: 'Scope', note: 'Use cases broad enough to matter.' },
      ],
    },

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onResize); };
  }, []);

  useEffect(() => {
    if (selectedResource || momentumOpen || gateOpen || applyOpen || kcoOpen || townhallOpen || underwriterOpen || momentumDownloadOpen || selectedMember || pillarOpen) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [selectedResource, momentumOpen, gateOpen, applyOpen, kcoOpen, townhallOpen, underwriterOpen, momentumDownloadOpen, selectedMember, pillarOpen]);

  useEffect(() => {
    if (localStorage.getItem('hcaic_access') === '1') setAccessGranted(true);
    const params = new URLSearchParams(window.location.search);
    const hash = window.location.hash;
    // Save variant tag to sessionStorage so it survives modal open
    const v = params.get('v');
    if (v) sessionStorage.setItem('hcaic_variant', v);
    if ((params.get('signup') === '1' || hash === '#signup') && !accessGranted) {
      setTimeout(() => setGateOpen(true), 400);
      return;
    }
    if (hash === '#register') {
      setTimeout(() => setTownhallOpen(true), 400);
      return;
    }
    if (hash === '#apply') {
      setTimeout(() => setApplyOpen(true), 400);
      return;
    }
    if (!hash) return;
    const timer = setTimeout(() => {
      const el = document.querySelector(hash);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }, 400);
    return () => clearTimeout(timer);
  }, []);

  // CTA handler: first click shows email gate, subsequent clicks go straight through
  const track = (event, params) => { if (window.gtag) window.gtag('event', event, params || {}); };

  const CLICKS_KEY = '$2a$10$prZqMqXbtmzSXZyh1nHLcOt1RcJbDCcAgppQ/6J2Brax5qLkY8Ggm';
  const CLICKS_URL = 'https://api.jsonbin.io/v3/b/69f340c4aaba88219756240d';
  const RESOURCE_KEY_MAP = { literacy: 'course', responsible: 'workbook', change: 'ebook', decision: 'framework' };

  const handleResourceCta = (resource) => {
    track('resource_cta_click', { resource_name: resource.title });
    const binKey = RESOURCE_KEY_MAP[resource.id];
    if (binKey) {
      fetch(CLICKS_URL + '/latest', { headers: { 'X-ACCESS-KEY': CLICKS_KEY } })
        .then(r => r.json())
        .then(data => {
          const counts = data.record;
          counts[binKey] = (counts[binKey] || 0) + 1;
          fetch(CLICKS_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-ACCESS-KEY': CLICKS_KEY }, body: JSON.stringify(counts) });
        }).catch(() => {});
    }
    if (resource.link) window.open(resource.link, "_blank");
  };

  const handleGateSubmit = () => {
    track('form_submit', { form_name: 'toolkit_gate', variant: sessionStorage.getItem('hcaic_variant') || 'organic' });
    // Open thank you page immediately (popup must be triggered by user gesture)
    window.open('thankyou.html', '_blank');
    // Delay state changes so the form POST reaches MailerLite before the form unmounts
    setTimeout(() => {
      localStorage.setItem('hcaic_access', '1');
      setAccessGranted(true);
      setGateOpen(false);
      if (pendingResourceCta) {
        const r = pendingResourceCta;
        setPendingResourceCta(null);
        setTimeout(() => { if (r.link) window.open(r.link, "_blank"); }, 250);

    }, 1000);

    lilac: '#9D92AD',
    lilacLight: '#C1BACD',
    ivory: '#F7F1EA',
    ivoryDeep: '#EAE3D5',
    slate: '#555961',
    cream: '#FDECCD',
    white: '#FFFFFF',
