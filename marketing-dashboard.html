<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="favicon.png" />
<title>Kyle &amp; Co — Marketing KPIs Q2 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #F7F1EA;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: #273752;
  min-height: 100vh;
  padding: 3rem 2rem;
}

.page { max-width: 980px; margin: 0 auto; }

/* ── Header ── */
.header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 2.5rem; padding-bottom: 1.5rem;
  border-bottom: 1px solid rgba(39,55,82,0.12);
  flex-wrap: wrap; gap: 1rem;
}
.brand { display: flex; align-items: center; gap: 0.75rem; }
.brand-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; background: #273752; border-radius: 6px;
  font-family: Georgia, serif; font-size: 1.2rem; font-style: italic;
  color: #FDECCD; flex-shrink: 0;
}
.brand-name { font-size: 1rem; font-weight: 600; color: #273752; }
.brand-label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: #9D92AD; font-weight: 500; margin-top: 0.1rem; }

.header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.last-updated-text { font-size: 0.75rem; color: #9D92AD; }

.btn {
  display: inline-block; border: none; border-radius: 100px;
  padding: 0.5rem 1.1rem; font-size: 0.78rem; font-family: inherit;
  cursor: pointer; font-weight: 500; text-decoration: none;
  transition: opacity 0.15s; white-space: nowrap;
}
.btn:hover { opacity: 0.8; }
.btn-primary { background: #273752; color: #F7F1EA; }
.btn-ghost { background: #F7F1EA; color: #273752; border: 1px solid rgba(39,55,82,0.2); }

/* ── Alert banner ── */
.banner {
  border-radius: 8px; padding: 0.75rem 1.25rem;
  font-size: 0.8rem; margin-bottom: 2rem; display: none; line-height: 1.5;
}
.banner-demo { background: #FDECCD; color: #273752; }
.banner-error { background: rgba(185,28,28,0.08); color: #b91c1c; }

/* ── Section ── */
.section { margin-bottom: 2.5rem; }
.section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 1rem;
}
.section-title { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: #9D92AD; font-weight: 600; }
.section-source { font-size: 0.65rem; color: #9D92AD; opacity: 0.7; }

/* ── Card grid ── */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1rem; }

/* ── KPI card ── */
.card {
  background: #fff; border-radius: 10px; padding: 1.4rem;
  border-top: 3px solid #273752;
  display: flex; flex-direction: column;
}
.card.accent-email  { border-top-color: #273752; }
.card.accent-web    { border-top-color: #2D5C94; }
.card.accent-content{ border-top-color: #9D92AD; }
.card.accent-milestone { border-top-color: #FDECCD; }
.card.accent-podcast   { border-top-color: #B45309; }

.card-name {
  font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: #9D92AD; font-weight: 600; margin-bottom: 0.35rem;
}
.card-value {
  font-size: 2.6rem; font-weight: 300; color: #273752;
  line-height: 1; letter-spacing: -0.03em; margin-bottom: 0.2rem;
}
.card-value.sm { font-size: 2rem; }
.card-sublabel { font-size: 0.78rem; color: #555961; }
.card-target  { font-size: 0.7rem; color: #9D92AD; margin-top: 0.15rem; }
.kpi-badge {
  display: inline-block; font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #FDECCD; background: #273752;
  padding: 2px 7px; border-radius: 100px; margin-bottom: 0.4rem;
}

/* ── Status chip ── */
.chip {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 0.68rem; font-weight: 600;
  padding: 3px 10px; border-radius: 100px; margin-top: 0.5rem;
  align-self: flex-start;
}
.chip.on-track    { background: rgba(22,163,74,0.1);  color: #16a34a; }
.chip.at-risk     { background: rgba(202,138,4,0.1);  color: #b45309; }
.chip.behind      { background: rgba(185,28,28,0.1);  color: #b91c1c; }
.chip.manual      { background: rgba(157,146,173,0.12); color: #9D92AD; }
.chip.tbd         { background: rgba(157,146,173,0.12); color: #9D92AD; }
.chip.in-progress { background: rgba(45,92,148,0.1);  color: #2D5C94; }
.chip.done        { background: rgba(22,163,74,0.1);  color: #16a34a; }

/* ── Progress bar ── */
.progress-wrap { margin-top: 0.75rem; }
.progress-labels {
  display: flex; justify-content: space-between;
  font-size: 0.58rem; color: #9D92AD; margin-bottom: 0.35rem;
}
.progress-track {
  height: 6px; background: rgba(39,55,82,0.08); border-radius: 100px;
  position: relative; overflow: visible;
}
.progress-fill {
  height: 100%; border-radius: 100px; transition: width 0.6s ease;
  background: #273752; max-width: 100%;
}
.progress-fill.green  { background: #16a34a; }
.progress-fill.yellow { background: #ca8a04; }
.progress-fill.red    { background: #b91c1c; }
/* Q2 pace marker — where we "should" be today if pacing linearly */
.pace-marker {
  position: absolute;
  top: -4px; bottom: -4px; width: 2px;
  background: #2D5C94; border-radius: 1px; opacity: 0.5;
}
.pace-label {
  font-size: 0.6rem; color: #2D5C94; margin-top: 0.3rem; opacity: 0.8;
}

/* ── Podcast episode list ── */
.ep-list { margin-top: 1rem; border-top: 1px solid rgba(39,55,82,0.08); padding-top: 0.5rem; }
.ep-row {
  display: grid;
  grid-template-columns: 1fr 52px 140px 44px;
  gap: 0.2rem 0.75rem;
  align-items: center;
  padding: 0.45rem 0;
}
.ep-row + .ep-row { border-top: 1px solid rgba(39,55,82,0.05); }
.ep-title { font-size: 0.78rem; color: #273752; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ep-date  { font-size: 0.68rem; color: #9D92AD; white-space: nowrap; }
.ep-bar-wrap { height: 4px; background: rgba(39,55,82,0.08); border-radius: 100px; }
.ep-bar-fill { height: 100%; background: #B45309; border-radius: 100px; transition: width 0.6s ease; }
.ep-count { font-size: 0.78rem; font-weight: 600; color: #273752; text-align: right; }
/* Context strip */
.context-strip {
  background: #fff; border-radius: 10px;
  padding: 1rem 1.4rem; margin-bottom: 2rem;
  font-size: 0.8rem; color: #555961; line-height: 1.7;
  border-left: 3px solid #2D5C94;
}
.context-strip strong { color: #273752; }
.context-strip .ctx-row { margin-bottom: 0.2rem; }
.context-strip .ctx-row:last-child { margin-bottom: 0; }

/* ── Milestone rows ── */
.milestone {
  background: #fff; border-radius: 10px; padding: 1rem 1.4rem;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.6rem;
}
.milestone:last-child { margin-bottom: 0; }
.milestone-name { font-size: 0.88rem; font-weight: 500; color: #273752; }
.milestone-note { font-size: 0.7rem; color: #9D92AD; margin-top: 0.15rem; }
.milestone .chip { margin-top: 0; }

/* ── Summary bar ── */
.summary-bar {
  background: #273752; border-radius: 10px; padding: 1.4rem 2rem;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
  margin-bottom: 2.5rem;
}
.summary-item { text-align: center; }
.summary-value { font-size: 1.8rem; font-weight: 300; color: #F7F1EA; letter-spacing: -0.03em; }
.summary-label { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(247,241,234,0.5); margin-top: 0.2rem; }

/* ── Loading ── */
.loading-overlay { text-align: center; padding: 4rem; color: #9D92AD; font-size: 0.9rem; }

@media (max-width: 640px) {
  body { padding: 2rem 1.25rem; }
  .cards { grid-template-columns: 1fr 1fr; }
  .card-value { font-size: 2rem; }
  .summary-bar { grid-template-columns: 1fr; }
}
@media (max-width: 420px) {
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>

  <div class="header">

<script>
// ─────────────────────────────────────────────────────────────────────

var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbym3BL0-Hb-gqaQwtgTpd7dYcmyq_hU7h3hEzGbapVqbyUGJF58JaLe-snl2Ke2io6lmQ/exec';

// ── Resource clicks from existing dashboard (JSONBin) ─────────────────
var JSONBIN_URL = 'https://api.jsonbin.io/v3/b/69f340c4aaba88219756240d/latest';
var JSONBIN_KEY = '$2a$10$prZqMqXbtmzSXZyh1nHLcOt1RcJbDCcAgppQ/6J2Brax5qLkY8Ggm';

      };

}

// ── Q2 pacing (how far through the quarter are we today?) ────────────
var Q2_TOTAL_DAYS  = 91; // Apr 30 + May 31 + Jun 30
var Q2_START_DATE  = new Date('2026-04-01');
var q2Elapsed      = Math.min(Q2_TOTAL_DAYS, Math.max(0, Math.floor((new Date() - Q2_START_DATE) / 86400000)));
var Q2_PCT         = Math.round((q2Elapsed / Q2_TOTAL_DAYS) * 100); // e.g. 77
var Q2_DAYS_LEFT   = Q2_TOTAL_DAYS - q2Elapsed;

// ── Q2 2026 targets — from Marketing Strategy deck ───────────────────
// Q1 baseline: 15,645 · Q2 target: 17,000 · Net new needed: 1,355
// Payout: 100% = $6K · 90% = $4.5K · 80% = $3K
var Q1_BASELINE = 15645;
var T = {
  netNewSubs:      1355,    // Q2 goal: 17,000 total
  qoqGrowth:       27.0,   // (1,200 − 945) / 945 — organic core audience
  ctorBroadcast:   10,
  liReferrals:     693,
  practitionerPct: 68,
  organicGrowth:   1200,
};

// ── Demo data (shown when SCRIPT_URL is not set) ─────────────────────
var DEMO = {
  email: {

  },
  web: {

    liReferrals:         412,
    reportDownloads:      91,
  },
  content: {
    contentShipped:        8,
    liPostsPerWeek:      2.8,
  },
  milestones: {
    vendorImpactBriefs: 'in-progress',
    advisoryInquiries:  'on-track',
    speaking:           'tbd',
  },
  candidateFraud: { earlyAccess: 34, webinar: 87 },
  podcast: {
    q2Episodes: 6,
    q2Listens: 517,
    avgPerEpisode: 86,
    episodes: [
      { title: 'Beyond the Algorithm: Joe Shaker on Creativity in Recruitment Marketing', published: '2026-04-29', total: 222 },
      { title: 'The Indispensable Recruiter: Rocki Howard on Staying Human in an AI World', published: '2026-05-06', total: 121 },
      { title: "By the Numbers: GEM’s Steve Bartel on the Real State of Recruiting", published: '2026-05-12', total: 67 },
      { title: 'Bridging the Gap: Julia Levy on Supporting Graduates in a Post-Pandemic World', published: '2026-05-14', total: 56 },
      { title: 'The Culture of Learning: Jason Desentz on Leading HR at Toshiba', published: '2026-05-21', total: 40 },
      { title: 'The New ROI: Cathy Peterman (Wayfair) on Engineering Productivity in the AI Era', published: '2026-05-28', total: 11 },
    ],
  },
  lastUpdated: null,
  isDemo: true,
  sheetUrl: '',
};

// ── Helpers ───────────────────────────────────────────────────────────
function fmt(n, dec) {
  if (n == null || isNaN(n)) return '—';
  return typeof dec === 'number' ? (+n).toFixed(dec) : Math.round(n).toLocaleString();
}

function fmtPct(n, dec) {
  if (n == null || isNaN(n)) return '—';
  return (typeof dec === 'number' ? (+n).toFixed(dec) : (+n).toFixed(1)) + '%';
}

function fmtDate(s) {
  if (!s) return '';
  try {
    var d = new Date(s + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch(e) { return s; }
}

function getStatus(val, target) {
  if (val == null) return 'tbd';
  var pct = val / target;
  if (pct >= 0.8) return 'on-track';
  if (pct >= 0.5) return 'at-risk';
  return 'behind';
}

function chip(status, labelOverride) {
  var labels = {
    'on-track':    '✓ On track',
    'at-risk':     '⚠ At risk',
    'behind':      '↓ Behind',
    'tbd':         'TBD',
    'manual':      '✎ Manual',
    'in-progress': '→ In progress',
    'done':        '✓ Done',
    'not-started': 'Not started',
  };
  var lbl = labelOverride || labels[status] || status;
  return '<span class="chip ' + status + '">' + lbl + '</span>';
}

function progressBar(val, target, label) {
  if (val == null) return '';
  var pct = Math.min(100, (val / target) * 100);
  var cls = pct >= 80 ? 'green' : pct >= 50 ? 'yellow' : 'red';
  var lbl = label !== undefined ? label : target;
  var paceNote = pct < Q2_PCT
    ? '<div class="pace-label">↑ Pace target today: ' + Math.round((Q2_PCT / 100) * target) + ' (' + Q2_PCT + '% of quarter elapsed)</div>'
    : '';
  return '<div class="progress-wrap">' +
    '<div class="progress-labels"><span>0</span><span>' + lbl + '</span></div>' +
    '<div class="progress-track">' +
      '<div class="progress-fill ' + cls + '" style="width:' + pct + '%"></div>' +
      '<div class="pace-marker" style="left:' + Q2_PCT + '%"></div>' +
    '</div>' +
    paceNote +
    '</div>';
}

// ── Card builder ──────────────────────────────────────────────────────
function card(opts) {
  /* opts: accent, name, value, valueClass, sublabel, target, chipHtml, progressHtml, isKpi */
  return '<div class="card accent-' + (opts.accent||'email') + '">' +
    (opts.isKpi ? '<div class="kpi-badge">Q2 Bonus KPI</div>' : '') +
    '<div class="card-name">' + opts.name + '</div>' +
    '<div class="card-value' + (opts.valueClass ? ' '+opts.valueClass : '') + '">' + (opts.value||'—') + '</div>' +
    (opts.sublabel ? '<div class="card-sublabel">' + opts.sublabel + '</div>' : '') +
    (opts.target   ? '<div class="card-target">'   + opts.target   + '</div>' : '') +
    (opts.chipHtml || '') +
    (opts.progressHtml || '') +
    '</div>';
}

// ── Render ────────────────────────────────────────────────────────────
// Podcast — Transformation Realness (Megaphone exports; send me new ones to refresh)
var PODCAST = {
  ranges: {
    allTime: { label: 'All time',     downloads: 1738, episodes: 36,   avg: 48 },
    last90:  { label: 'Last 90 days', downloads: null, episodes: null, avg: null },
  },
  topEpisodes: [
    { title: 'From Shiny Objects to Real Solutions: Rebecca Carr on TA Tech', published: '2024-12-17', total: 262 },
    { title: 'Beyond the Algorithm: Joe Shaker on Creativity in Recruitment Marketing', published: '2026-04-29', total: 225 },
    { title: 'Invisible Software, Real Impact: Paradox on Frictionless Hiring', published: '2025-02-25', total: 155 },
    { title: "Workday's Big Play: Redefining HR Tech", published: '2025-02-12', total: 133 },
    { title: 'From Buzzword to Business Impact: Lightcast on Skills-Based Transformation', published: '2025-02-18', total: 132 },
    { title: 'Taming the Wild West of TA: GoodTime on Interview Chaos', published: '2025-02-04', total: 125 },
    { title: 'The Indispensable Recruiter: Rocki Howard on Staying Human in an AI World', published: '2026-05-06', total: 125 },
    { title: 'How HiredScore Is Making Waves With Smarter, Sharper, Iconic Outcomes', published: '2025-01-28', total: 101 },
    { title: "By the Numbers: GEM's Steve Bartel on the State of Recruiting", published: '2026-05-12', total: 72 },
    { title: 'Bridging the Gap: Julia Levy on Supporting Graduates', published: '2026-05-14', total: 62 },
  ],
};

function podcastRangeBox(r) {
  return '<div class="card accent-podcast">'
    + '<div class="card-name">' + r.label + '</div>'
    + '<div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:.6rem;">'
    + '<div><div class="card-value" style="font-size:1.8rem;">' + fmt(r.downloads) + '</div><div class="card-sublabel">downloads</div></div>'
    + '<div><div class="card-value" style="font-size:1.8rem;">' + fmt(r.episodes) + '</div><div class="card-sublabel">episodes</div></div>'
    + '<div><div class="card-value" style="font-size:1.8rem;">' + fmt(r.avg) + '</div><div class="card-sublabel">avg / ep</div></div>'
    + '</div></div>';
}

function render(data) {
  var e = data.email   || {};
  var w = data.web     || {};
  var c = data.content || {};
  var m = data.milestones || {};
  var p = data.podcast || null;
  var cf = data.candidateFraud || {};

  // ── Summary bar ──────────────────────────────────────────────────
  var totalSubs = e.totalSubscribers;
  var netNew    = e.netNewQ2;

  var html = '';
  html += '<div class="summary-bar">';
  html += '<div class="summary-item"><div class="summary-value">' + fmt(totalSubs) + '</div><div class="summary-label">Total subscribers</div></div>';
  html += '<div class="summary-item"><div class="summary-value">' + (netNew != null ? (netNew >= 0 ? '+' : '') + fmt(netNew) : '—') + '</div><div class="summary-label">Net new · Q2</div></div>';
  html += '<div class="summary-item"><div class="summary-value">' + fmtPct(e.broadcastCTOR, 1) + '</div><div class="summary-label">Email CTOR</div></div>';
  html += '</div>';

  // ── Context strip ──────────────────────────────────────────────────
  var ctxLines = [];
  ctxLines.push('Q2 is <strong>' + Q2_PCT + '% complete</strong> — ' + Q2_DAYS_LEFT + ' days remaining. The blue marker on each progress bar shows today\'s pace target.');
  if (e.broadcastCTOR != null && e.broadcastCTOR >= 5) {
    ctxLines.push('Email CTOR of <strong>' + fmtPct(e.broadcastCTOR, 1) + '</strong> exceeds the B2B average of 3–5%, indicating strong list quality. (Open rate is excluded — inflated by Apple Mail Privacy Protection.)');
  }
  if (netNew != null) {
    var paceNeeded = Math.round(T.netNewSubs * Q2_PCT / 100);
    if (netNew < paceNeeded) {
      ctxLines.push('New subscriber growth is <strong>' + fmt(paceNeeded - netNew) + ' behind today\'s pace</strong> toward the +' + fmt(T.netNewSubs) + ' Q2 goal (17,000 total).');
    } else {
      ctxLines.push('New subscriber growth is <strong>on pace</strong> toward the +' + fmt(T.netNewSubs) + ' Q2 goal (17,000 total).');
    }
  }
  if (ctxLines.length > 0) {
    html += '<div class="context-strip">';
    ctxLines.forEach(function(l) { html += '<div class="ctx-row">' + l + '</div>'; });
    html += '</div>';
  }

  // ══════════════════════════════════════════════════════════════════
  // SECTION 1 — Q2 Aligned KPIs (from marketing strategy deck)
  // ══════════════════════════════════════════════════════════════════
  html += '<div class="section">';
  html += '<div class="section-header"><div class="section-title">Q2 Aligned KPIs</div><div class="section-source">From marketing strategy deck</div></div>';
  html += '<div class="cards">';

  // New subscribers Q2
  var netNewStatus = getStatus(e.netNewQ2, T.netNewSubs);
  var totalTarget  = e.totalSubscribers != null ? fmt(e.totalSubscribers) + ' today → 17,000 goal' : '';
  html += card({
    accent: 'email',
    name: 'New subscribers · Q2',
    value: e.netNewQ2 != null ? '+' + fmt(e.netNewQ2) : '—',
    sublabel: totalTarget,
    target: 'Q2 goal: +' + fmt(T.netNewSubs),
    chipHtml: chip(netNewStatus),
    progressHtml: progressBar(e.netNewQ2, T.netNewSubs, '+' + fmt(T.netNewSubs)),
  });

  // QoQ growth — organic core audience
  var qoqStatus = getStatus(e.qoqGrowth, T.qoqGrowth);
  html += card({
    accent: 'email',
    name: 'QoQ organic core growth',
    value: fmtPct(e.qoqGrowth, 1),
    valueClass: 'sm',
    sublabel: 'Q1 organic baseline: 945 · Q2 goal: 1,200',
    target: 'Target: ~' + T.qoqGrowth + '%',
    chipHtml: chip(qoqStatus),
    progressHtml: progressBar(e.qoqGrowth, T.qoqGrowth, T.qoqGrowth + '%'),
  });

  // Practitioner %
  var practStatus = e.practitionerPct != null ? getStatus(e.practitionerPct, T.practitionerPct) : 'manual';
  html += card({
    accent: 'email',
    name: 'Practitioner % tagged',
    value: fmtPct(e.practitionerPct, 0),
    valueClass: 'sm',
    sublabel: 'Q1 baseline: 66.7% · Target: 68%+ (11,500+ practitioners)',
    chipHtml: e.practitionerPct != null ? chip(practStatus) : chip('manual', '✎ Update in sheet'),
    progressHtml: e.practitionerPct != null ? progressBar(e.practitionerPct, T.practitionerPct, T.practitionerPct + '%') : '',
  });

  // Organic / core audience count
  var organicStatus = e.organicCount != null ? getStatus(e.organicCount, T.organicGrowth) : 'manual';
  html += card({
    accent: 'email',
    name: 'Organic core audience',
    value: fmt(e.organicCount),
    sublabel: 'Q1 baseline: 945 · Q2 target: 1,200',
    target: 'Goal: ' + fmt(T.organicGrowth) + ' organic subscribers',
    chipHtml: e.organicCount != null ? chip(organicStatus) : chip('manual', '✎ Update in sheet'),
    progressHtml: e.organicCount != null ? progressBar(e.organicCount, T.organicGrowth, fmt(T.organicGrowth)) : '',
  });

  html += '</div>';

  // Milestone commitments (part of aligned KPIs)
  html += '<div style="margin-top:1rem;">';
  var msLabels = {
    'on-track': '✓ On track', 'in-progress': '→ In progress',
    'behind': '↓ Behind', 'done': '✓ Done', 'tbd': 'TBD', 'not-started': 'Not started',
  };
  [
    { label: 'Vendor Proof Delivered',            note: 'Q2: Toolkit Impact Brief (30 days post-launch)',  key: m.vendorImpactBriefs },
    { label: 'Advisory Inquiry path live',        note: 'Q2: Path live by May 15 · form → Kyle → close',  key: m.advisoryInquiries  },
    { label: 'Speaking page live',                note: 'Q2: Speaking page · Q3: Mainstage pitches',       key: m.speaking           },
  ].forEach(function(ms) {
    var s = ms.key || 'tbd';
    html += '<div class="milestone">' +
      '<div><div class="milestone-name">' + ms.label + '</div><div class="milestone-note">' + ms.note + '</div></div>' +
      chip(s, msLabels[s] || s) +
      '</div>';
  });
  html += '</div></div>';

  // ══════════════════════════════════════════════════════════════════
  // SECTION 2 — Visibility & Engagement (informational, not payout-tied)
  // ══════════════════════════════════════════════════════════════════
  html += '<div class="section">';
  html += '<div class="section-header"><div class="section-title">Visibility & Engagement</div><div class="section-source">MailerLite · GA4 · manual</div></div>';
  html += '<div class="cards">';

  // CTOR
  var ctorStatus = e.broadcastCTOR != null ? getStatus(e.broadcastCTOR, T.ctorBroadcast) : 'tbd';
  html += card({
    accent: 'email',
    name: 'Email CTOR',
    value: fmtPct(e.broadcastCTOR, 1),
    valueClass: 'sm',
    sublabel: 'Clicks ÷ opens · industry avg: 3–5%',
    target: 'Target: ≥' + T.ctorBroadcast + '%',
    chipHtml: chip(ctorStatus),
    progressHtml: e.broadcastCTOR != null ? progressBar(e.broadcastCTOR, T.ctorBroadcast, T.ctorBroadcast + '%') : '',
  });

  // Blog views YTD
  html += card({
    accent: 'web',
    name: 'Blog views · YTD',
    value: fmt(w.blogViewsYTD),
    sublabel: 'year to date',
  });

  // LinkedIn referrals
  html += card({
    accent: 'web',
    name: 'LinkedIn referrals · Q2',
    value: fmt(w.liReferrals),
    target: 'Target: ' + fmt(T.liReferrals) + ' sessions',
    chipHtml: chip(getStatus(w.liReferrals, T.liReferrals)),
    progressHtml: progressBar(w.liReferrals, T.liReferrals, fmt(T.liReferrals)),
  });

  // Resource clicks
  var dlBreakdown = '';
  if (w.resourceClicks) {
    var rc = w.resourceClicks;
    dlBreakdown = '<div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(39,55,82,0.07);display:grid;grid-template-columns:1fr 1fr;gap:0.3rem 0.75rem;">' +
      '<div style="font-size:0.68rem;color:#9D92AD;">AI Literacy</div><div style="font-size:0.68rem;font-weight:600;color:#273752;text-align:right;">' + rc.course + '</div>' +
      '<div style="font-size:0.68rem;color:#9D92AD;">Change Mgmt eBook</div><div style="font-size:0.68rem;font-weight:600;color:#273752;text-align:right;">' + rc.ebook + '</div>' +
      '<div style="font-size:0.68rem;color:#9D92AD;">Solution Framework</div><div style="font-size:0.68rem;font-weight:600;color:#273752;text-align:right;">' + rc.framework + '</div>' +
      '<div style="font-size:0.68rem;color:#9D92AD;">Responsible AI</div><div style="font-size:0.68rem;font-weight:600;color:#273752;text-align:right;">' + rc.workbook + '</div>' +
      '</div>';
  }
  html += card({
    accent: 'web',
    name: 'Resource clicks · all time',
    value: fmt(w.reportDownloads),
    chipHtml: chip('manual', '↗ All time'),
    progressHtml: dlBreakdown,
  });

  // Candidate Fraud report — overall engagement
  var cfDownloads    = (w.resourceClicks && w.resourceClicks.candidatefraud) || 0;
  var cfEarlyAccess  = cf.earlyAccess || 0;
  var cfWebinar      = cf.webinar     || 0;
  html += '<div class="card accent-web" style="grid-column:1/-1;">';
  html += '<div class="card-name">Candidate Fraud · Report Engagement</div>';
  html += '<div style="display:flex;gap:3rem;flex-wrap:wrap;margin-top:.75rem;align-items:flex-end;">';
  html += '<div><div class="card-value" style="font-size:2rem;">' + fmt(cfEarlyAccess) + '</div><div class="card-sublabel">early access signups</div></div>';
  html += '<div><div class="card-value" style="font-size:2rem;">' + fmt(cfWebinar) + '</div><div class="card-sublabel">webinar registrants</div></div>';
  html += '<div><div class="card-value" style="font-size:2rem;">' + fmt(cfDownloads) + '</div><div class="card-sublabel">direct downloads</div></div>';
  html += '</div>';
  html += '<div style="margin-top:.5rem;font-size:.72rem;color:var(--muted);">Early access + webinar via MailerLite · Direct downloads via site counter (real grabs). The report page itself is ungated, so email-driven reads show up in GA4, not here.</div>';
  html += '</div>';


  html += '</div></div>';

  // ══════════════════════════════════════════════════════════════════
  // SECTION 3 — Podcast — Transformation Realness
  // ══════════════════════════════════════════════════════════════════
  if (p && p.ranges) {
    html += '<div class="section">';
    html += '<div class="section-header"><div class="section-title">Podcast — Transformation Realness</div><div class="section-source">Megaphone</div></div>';
    html += '<div class="cards">';

    // Side-by-side: All time vs Last 90 days
    html += '<div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;">';
    html += podcastRangeBox(p.ranges.allTime);
    html += podcastRangeBox(p.ranges.last90);
    html += '</div>';

    // Top 10 episodes (all time)
    if (p.topEpisodes && p.topEpisodes.length > 0) {
      html += '<div class="card accent-podcast" style="grid-column:1/-1;">';
      html += '<div class="card-name">Top 10 episodes · all time</div>';
      var maxListens = Math.max.apply(null, p.topEpisodes.map(function(ep) { return ep.total; }));
      html += '<div class="ep-list">';
      p.topEpisodes.forEach(function(ep) {
        var barPct = maxListens > 0 ? Math.round((ep.total / maxListens) * 100) : 0;
        html += '<div class="ep-row">' +
          '<div class="ep-title" title="' + ep.title.replace(/"/g, '&quot;') + '">' + ep.title + '</div>' +
          '<div class="ep-date">' + fmtDate(ep.published) + '</div>' +
          '<div class="ep-bar-wrap"><div class="ep-bar-fill" style="width:' + barPct + '%"></div></div>' +
          '<div class="ep-count">' + fmt(ep.total) + '</div>' +
          '</div>';
      });
      html += '</div></div>';
    }

    html += '</div></div>';
  }

  document.getElementById('main-content').innerHTML = html;
}

// ── Load data ─────────────────────────────────────────────────────────
function loadData() {
  document.getElementById('last-updated').textContent = 'Loading…';
  document.getElementById('error-banner').style.display = 'none';

  if (!SCRIPT_URL) {
    document.getElementById('demo-banner').style.display = 'block';
    render(DEMO);
    document.getElementById('last-updated').textContent = 'Demo mode · not live data';
    return;
  }

  Promise.all([
    fetch(SCRIPT_URL + '?t=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
    fetchResourceClicks(),
  ])
    .then(function(results) {
      var data   = results[0];
      var clicks = results[1];
      if (clicks && data.web) {
        data.web.reportDownloads = clicks.total;
        data.web.resourceClicks  = clicks;
      }
      // Show the full Megaphone export (aggregate + top 10), not the partial Sheet pull.
      data.podcast = PODCAST;
      document.getElementById('demo-banner').style.display = data.isDemo ? 'block' : 'none';
      if (data.sheetUrl) {
        var el = document.getElementById('edit-link');
        el.href = data.sheetUrl;
        el.style.display = 'inline-block';
      }
      render(data);
      var ts = data.lastUpdated
        ? new Date(data.lastUpdated).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })
        : 'just now';
      document.getElementById('last-updated').textContent = 'Updated ' + ts;
    })
    .catch(function(err) {
      var b = document.getElementById('error-banner');
      b.textContent = 'Could not load live data (' + err.message + ') — showing demo data.';
      b.style.display = 'block';
      render(DEMO);
      document.getElementById('last-updated').textContent = 'Load failed';
    });
}

loadData();
</script>
